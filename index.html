<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Oussama Mouggal (Oussama-Mouggal)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="root">
      <div id="select-show-drop-down">
        <label for="select-show">Select show</label>
        <select id="select-show" name="select-show">
          <option value="" selected disabled>Choose a show</option>
        </select>
      </div>
      <div id="search-controls">
        <label for="search-input">Search episodes</label>
        <input
          id="search-input"
          type="search"
          placeholder="Search episodes"
          name="search"
        />
        <p id="search-label" aria-live="polite">Displaying 73/73 episodes</p>
      </div>
      <div id="select-episode-drop-down">
        <label for="select-episode">Select episode</label>
        <select id="select-episode" name="select-episode">
          <option value="" selected disabled>Choose an episode</option>
          <option value="all-episodes">All episodes</option>
        </select>
      </div>
    </div>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
